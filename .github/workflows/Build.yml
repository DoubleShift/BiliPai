name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        type: choice
        description: '选择编译类型'
        required: true
        default: 'debug'
        options:
          - 'debug'
          - 'release'

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NATIVE_TARGET: "arm64-v8a"
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: Set Build Type
        id: set_build_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "build_type=${{ github.event.inputs.build_type }}" >> $GITHUB_OUTPUT
          else
            echo "build_type=debug" >> $GITHUB_OUTPUT
          fi
          echo "构建类型: ${{ steps.set_build_type.outputs.build_type }}"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: |
          if [ "${{ steps.set_build_type.outputs.build_type }}" = "release" ]; then
            echo "🔨 构建 Release 版本..."
            ./gradlew assembleRelease --no-daemon
          else
            echo "🔨 构建 Debug 版本..."
            ./gradlew assembleDebug --no-daemon
          fi

      - name: Find and upload APK files
        id: find_apks
        run: |
          # 查找所有 APK 文件
          APK_FILES=$(find ${{ github.workspace }}/app/build/outputs/apk/ -name "*.apk" -type f)

          if [ -z "$APK_FILES" ]; then
            echo "❌ 未找到 APK 文件"
            exit 1
          fi

          # 将找到的 APK 文件路径输出为多行字符串
          echo "apk_files<<EOF" >> $GITHUB_OUTPUT
          echo "$APK_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "✅ 找到 APK 文件:"
          echo "$APK_FILES"

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BiliPai-${{ steps.set_build_type.outputs.build_type }}
          path: ${{ steps.find_apks.outputs.apk_files }}
          retention-days: 30
          if-no-files-found: error

      - name: Build Summary
        run: |
          echo "# 🎉 构建完成！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**构建类型:** ${{ steps.set_build_type.outputs.build_type }}" >> $GITHUB_STEP_SUMMARY
          echo "**APK 文件:**" >> $GITHUB_STEP_SUMMARY
          echo "$APK_FILES" >> $GITHUB_STEP_SUMMARY
